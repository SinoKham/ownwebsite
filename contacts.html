    <main>
        <h1>Контакты</h1>
        
        <p><strong>⚠️ Примечание безопасности:</strong> Прямые контакты скрыты от спам-ботов. Используйте форму обратной связи ниже.</p>
        
        <h2>Форма обратной связи</h2>
        <form class="form-group">
            <div class="form-group">
                <label for="name">Ваше имя:</label>
                <input type="text" id="name" name="name" placeholder="Иван Петров" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="example@example.com" required>
            </div>
            <div class="form-group">
                <label for="message">Сообщение:</label>
                <textarea id="message" name="message" rows="5" placeholder="Ваше сообщение..." required></textarea>
            </div>
            <button type="submit">Отправить сообщение</button>
        </form>
        
        <hr>
        
        <h2>Режим работы</h2>
        <p>Пн-Пт: 14:00 - 19:00</p>
        <p>Вс: выходной</p>
        
    </main>
